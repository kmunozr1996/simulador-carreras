<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pit Wall - Simulador de Estrategia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-6">

    <header class="border-b border-gray-800 pb-4 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold tracking-wider text-yellow-400">🏎️ PIT WALL // STRATEGY ENGINE</h1>
            <p class="text-xs text-gray-400">Circuito de Pruebas: Monza (53 Vueltas)</p>
        </div>
        <div class="bg-gray-900 px-4 py-2 rounded border border-gray-800 text-right">
            <span class="text-xs block text-gray-500">ESTADO DEL SISTEMA</span>
            <span class="text-emerald-400 font-bold text-sm text-xs">LIVE / ONLINE</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="bg-gray-900 p-5 rounded-lg border border-gray-800 flex flex-col justify-between">
            <div>
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 border-b border-gray-800 pb-2">Configuración</h2>
                
                <div class="mb-6">
                    <label class="block text-xs text-gray-400 mb-2">Compuesto del Neumático</label>
                    <select id="tyreSelect" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-sm text-yellow-400 focus:outline-none focus:border-yellow-400">
                        <option value="SOFT">🔴 Blando (Soft)</option>
                        <option value="MEDIUM" selected>🟡 Medio (Medium)</option>
                        <option value="HARD">⚪ Duro (Hard)</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-xs text-gray-400 mb-2">Vueltas Planificadas en la Tanda</label>
                    <input type="range" id="lapsRange" min="5" max="40" value="20" class="w-full accent-yellow-400">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>5v</span>
                        <span id="lapsValue" class="text-yellow-400 font-bold text-sm">20 vueltas</span>
                        <span>40v</span>
                    </div>
                </div>
            </div>

            <button id="runBtn" class="w-full bg-yellow-400 text-gray-950 font-bold py-3 rounded hover:bg-yellow-300 transition-colors uppercase tracking-wider text-sm mt-4">
                Calcular Telemetría
            </button>
        </div>

        <div class="lg:col-span-2 bg-gray-900 p-5 rounded-lg border border-gray-800">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 border-b border-gray-800 pb-2">Curva de Degradación (Tiempos por Vuelta)</h2>
            <div class="h-64 w-full relative">
                <canvas id="strategyChart"></canvas>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
